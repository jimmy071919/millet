name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ffmpeg/ffprobe are required at runtime by millet_record.audio
      # (read_stereo_channels probes channels via ffprobe and decodes via
      # ffmpeg).  ubuntu-latest preinstalls ffmpeg in /usr/bin since 2023+,
      # but install it explicitly for forward compat.
      - name: Install ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends ffmpeg

      # The full [dev] extra would pull in whisperx + torch (~700MB) which is
      # overkill for the lint + focused-unit-test loop.  Install the minimal
      # set of runtime deps the focused tests actually exercise, plus the
      # tooling.
      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest pytest-timeout numpy click reportlab requests
          # millet-record provides the millet_record package that the
          # millet/{capture,audio,utils,languages}.py shims re-export.
          # Pull it from PyPI but skip its optional GUI/pyaudio extras.
          python -m pip install millet-record
          python -m pip install -e . --no-deps

      - name: Ruff lint
        # Full package + tests tree (lint config lives in pyproject.toml).
        run: ruff check millet/ tests/

      - name: Pytest (focused, no-torch/no-GTK)
        # whisperx + torch (~700 MB) and a GTK display aren't available in CI.
        # Run the suites that monkeypatch their heavy deps; skip test_gui.py
        # (needs gi/GTK) and the torch-device-detection cases in
        # test_transcribe.py / test_cli.py.
        run: |
          pytest -q \
            tests/test_shim_imports.py \
            tests/test_paths.py \
            tests/test_utils.py \
            tests/test_capture.py \
            tests/test_summarize.py \
            tests/test_summarize_twopass.py \
            tests/test_summarize_tinfoil_retry.py \
            tests/test_frontmatter.py \
            tests/test_pdf.py \
            tests/test_label.py \
            tests/test_ingest.py \
            tests/test_ssl_cert_injection.py \
            tests/test_sync_team.py
