name: release

# Release pipeline for millet-pipeline (pure-Python: one py3-none-any wheel +
# sdist).
#
# On a `v*` TAG push, build the wheel + sdist and publish them to PyPI via
# PyPI Trusted Publishing (OIDC — no stored token; this workflow must be
# registered as a trusted publisher on the PyPI `millet-pipeline` project,
# environment `pypi`).
#
# Manual `workflow_dispatch` runs build only (no publish), for safe testing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build
          ls -la dist/

      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  publish:
    # Only on a `v*` tag push, after a clean build. Manual dispatch skips
    # publish (build job still runs, for testing).
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC). No API token stored.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
